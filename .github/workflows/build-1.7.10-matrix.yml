name: Build 1.7.10 Matrix

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: "Runner OS"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
      loader:
        description: "Loader to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - forge
          - bukkit
      minecraft_version:
        description: "Optional specific MC version (blank = all in matrix json)"
        required: false
        default: ""
        type: string
      release_tag:
        description: "Release tag (blank => v<mod_version>-all or v<mod_version>-mc<version>)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build 1.7.10 (${{ inputs.runner_os }})
    runs-on: ${{ inputs.runner_os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build 1.7.10 Matrix
        shell: pwsh
        run: |
          $loader = "${{ inputs.loader }}"
          $mc = "${{ inputs.minecraft_version }}"
          if ([string]::IsNullOrWhiteSpace($mc)) {
            ./tools/build-1.7.10.ps1 -Loader $loader
          } else {
            ./tools/build-1.7.10.ps1 -Loader $loader -MinecraftVersion $mc
          }

      - name: Resolve Release Values
        id: rel
        shell: pwsh
        run: |
          $mc = "${{ inputs.minecraft_version }}".Trim()
          $tagInput = "${{ inputs.release_tag }}".Trim()
          $line = (Get-Content gradle.properties | Where-Object { $_ -match '^mod_version=' } | Select-Object -First 1)
          $modVer = $line.Split('=')[1].Trim()
          if ([string]::IsNullOrWhiteSpace($mc)) {
            $scope = "all"
            $scopeName = "All Versions"
          } else {
            $scope = "mc$mc"
            $scopeName = "MC $mc"
          }
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $tag = "v$modVer-$scope"
          } else {
            $tag = $tagInput
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "mod_version=$modVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "scope_name=$scopeName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Collect Jars
        id: collect
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $files = Get-ChildItem -Path build/matrix-release -Filter *.jar -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Host "No jars were produced. Skipping release publish for this run."
            "has_files=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          Copy-Item -Path $files.FullName -Destination dist -Force
          Get-ChildItem dist
          "has_files=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish GitHub Release
        if: steps.collect.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: NekoNameTags ${{ steps.rel.outputs.mod_version }} (${{ steps.rel.outputs.scope_name }})
          files: dist/*.jar
          generate_release_notes: true
