name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jdk-installer-check:
    name: JDK Install Check (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ["8", "17", "21"]
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Verify Java
        run: java -version

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: jdk-installer-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read Version
        id: ver
        shell: pwsh
        run: |
          $line = (Get-Content gradle.properties | Where-Object { $_ -match '^mod_version=' } | Select-Object -First 1)
          $version = $line.Split('=')[1].Trim()
          "mod_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Modules (Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon \
            :core:build \
            :plugin-paper:build \
            :plugin-sponge:build \
            :mod-fabric-1_21:build \
            :mod-forge-1_21:build \
            :mod-neoforge-1_21:build

      - name: Build Modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\gradlew.bat --no-daemon `
            :core:build `
            :plugin-paper:build `
            :plugin-sponge:build `
            :mod-fabric-1_21:build `
            :mod-forge-1_21:build `
            :mod-neoforge-1_21:build

      - name: Collect Jars
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Recurse -Path . -Filter *.jar |
            Where-Object { $_.FullName -like "*\build\libs\*" -and $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" } |
            ForEach-Object { Copy-Item $_.FullName -Destination (Join-Path "dist" $_.Name) -Force }
          Get-ChildItem dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekonametags-${{ steps.ver.outputs.mod_version }}-${{ runner.os }}
          path: dist/*.jar

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nekonametags-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NekoNameTags ${{ github.ref_name }}
          files: dist/*.jar
          generate_release_notes: true
