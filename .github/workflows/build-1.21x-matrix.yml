name: Build 1.21x Matrix

on:
  workflow_dispatch:
    inputs:
      runner_os:
        description: "Runner OS"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
      loader:
        description: "Loader to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - paper
          - sponge
          - fabric
          - forge
          - neoforge
      minecraft_version:
        description: "Optional specific MC version (blank = all in matrix json)"
        required: false
        default: ""
        type: string

jobs:
  build:
    name: Build 1.21x (${{ inputs.runner_os }})
    runs-on: ${{ inputs.runner_os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build 1.21x Matrix
        shell: pwsh
        run: |
          $loader = "${{ inputs.loader }}"
          $mc = "${{ inputs.minecraft_version }}"
          if ([string]::IsNullOrWhiteSpace($mc)) {
            ./tools/build-1.21x.ps1 -Loader $loader
          } else {
            ./tools/build-1.21x.ps1 -Loader $loader -MinecraftVersion $mc
          }

      - name: Collect Jars
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Recurse -Path . -Filter *.jar |
            Where-Object { $_.FullName -like "*build*libs*" -and $_.Name -notlike "*-sources.jar" -and $_.Name -notlike "*-javadoc.jar" } |
            ForEach-Object { Copy-Item $_.FullName -Destination (Join-Path "dist" $_.Name) -Force }
          Get-ChildItem dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mc-1-21x-${{ inputs.loader }}
          path: dist/*.jar
