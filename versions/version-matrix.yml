# Build/profile guidance for expanding 1.7.10 -> 1.21.x support.
#
# Principle:
# - Keep one module per loader + version band.
# - Do not force one source set across incompatible API generations.

profiles:
  modern_1_21:
    java: 21
    modules:
      - plugin-paper
      - mod-fabric-1_21
      - mod-forge-1_21
    loaders:
      - paper-1.21.x
      - fabric-1.21.x
      - forge-1.21.x

  legacy_1_7_10:
    java: 8
    modules:
      - legacy-forge-1_7_10
      - legacy-plugin-1_7_10
    loaders:
      - forge-1.7.10
      - bukkit-1.7.10

  legacy_1_8_to_1_12:
    java: 8
    modules:
      - legacy-forge-1_12_2
      - legacy-plugin-1_8_8
    loaders:
      - forge-1.8.9..1.12.2
      - bukkit-1.8.8..1.12.2

  mid_1_13_to_1_16:
    java: 8
    modules:
      - plugin-paper-1_16
      - mod-fabric-1_16
      - mod-forge-1_16
    loaders:
      - paper-1.13..1.16
      - fabric-1.14..1.16
      - forge-1.13..1.16

  modern_1_17_to_1_20:
    java: 17
    modules:
      - plugin-paper-1_20
      - mod-fabric-1_20
      - mod-forge-1_20
    loaders:
      - paper-1.17..1.20
      - fabric-1.17..1.20
      - forge-1.17..1.20

